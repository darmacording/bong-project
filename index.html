<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>로또 번호 생성기</title>
  <link href='/style.css' rel='stylesheet'>
</head>
<body>
  <div class="theme-toggle">
    <button id="theme-btn" aria-label="테마 전환">
      <span class="mode-icon">🌙</span>
    </button>
  </div>
  <div class="container">
    <h1>로또 번호 생성기</h1>
    <p>한 번에 5개의 번호 조합을 생성합니다.</p>
    <button id="generate-btn">번호 생성하기</button>
    <div id="lotto-container"></div>
    <hr class="divider">
    <div class="contact-section">
      <h3>제휴 문의</h3>
      <form action="https://formspree.io/f/meenznyr" method="POST" id="contact-form">
        <div class="form-group">
          <input type="text" name="name" placeholder="이름" required>
        </div>
        <div class="form-group">
          <input type="email" name="_replyto" placeholder="이메일" required>
        </div>
        <div class="form-group">
          <textarea name="message" placeholder="문의 내용" required></textarea>
        </div>
        <button type="submit" id="submit-btn">문의 보내기</button>
      </form>
    </div>
    <hr class="divider">
    <div id="disqus_thread"></div>
  </div>
  <script defer type="text/javascript" src="/main.js"></script>
</body>
</html>
